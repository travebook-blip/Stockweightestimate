name: 每日更新籌碼評分

on:
  schedule:
    - cron: '0 10 * * 1-5'   # UTC 10:00 = 台灣時間 18:00，週一到週五
  workflow_dispatch:          # 允許在 Actions 分頁手動觸發

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝套件
        run: pip install -r requirements.txt

      - name: 執行評分（讀取 watchlist.txt，輸出到 output/）
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python stock_scanner.py --list watchlist.txt --token "$FINMIND_TOKEN"

      - name: 提交更新後的結果
        run: |
          git config user.name  "stock-bot"
          git config user.email "stock-bot@users.noreply.github.com"
          git add output
          git commit -m "評分自動更新 $(date -u +'%Y-%m-%d %H:%M') UTC" || echo "本次無變更，略過提交"
          git push
